name: Publish to WinGet
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.0.0.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: windows-latest
    if: ${{ !github.event.release.prerelease }}
    steps:
      - name: Submit update to WinGet
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: mjishnu.raven
          installers-regex: '-self-contained\.zip$'
          release-tag: ${{ inputs.tag || github.event.release.tag_name }}
          token: ${{ secrets.WINGET_TOKEN }}
